kind = "web"
previewPath = "/"
title = "Prossi Clinic"
version = "1.0.0"
id = "artifacts/prossi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24566

[services.development]
run = "pnpm --filter @workspace/prossi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prossi", "run", "build" ]
publicDir = "artifacts/prossi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24566"
BASE_PATH = "/"
